<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>吞嚥困難篩檢問卷</title>
  <style>
    :root {
      --primary: #2c6e9c;
      --primary-light: #e8f0f8;
      --danger: #c0392b;
      --warning: #e67e22;
      --success: #27ae60;
      --text: #2c3e50;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --border: #dee2e6;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--primary), #1a4a6e);
      color: white;
      padding: 32px 28px;
      border-radius: var(--radius);
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }

    header h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    header .subtitle {
      font-size: 14px;
      opacity: 0.85;
    }

    header .ref {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.7;
    }

    /* ===== Basic Info Section ===== */
    .info-section {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .info-section h2 {
      font-size: 16px;
      color: var(--primary);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--primary-light);
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .info-grid .full-width {
      grid-column: 1 / -1;
    }

    .info-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .info-field label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
    }

    .info-field label .required {
      color: var(--danger);
      margin-left: 2px;
    }

    .info-field input,
    .info-field select {
      padding: 10px 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
      background: white;
    }

    .info-field input:focus,
    .info-field select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .info-field .radio-group {
      display: flex;
      gap: 12px;
      padding-top: 4px;
    }

    .info-field .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
    }

    .info-field .radio-group input[type="radio"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid #bbb;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
      transition: all 0.2s;
      cursor: pointer;
    }

    .info-field .radio-group input[type="radio"]:checked {
      border-color: var(--primary);
    }

    .info-field .radio-group input[type="radio"]:checked::after {
      content: "";
      position: absolute;
      top: 2px; left: 2px;
      width: 8px; height: 8px;
      background: var(--primary);
      border-radius: 50%;
    }

    .intro-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--primary);
    }

    .intro-card p {
      font-size: 14px;
      color: #555;
    }

    /* Progress */
    .progress-bar {
      background: var(--border);
      border-radius: 10px;
      height: 8px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #3498db);
      border-radius: 10px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .progress-text {
      text-align: right;
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
    }

    /* Question */
    .question {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
    }

    .question:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .question .q-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 14px;
    }

    .question .q-num {
      background: var(--primary);
      color: white;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .question .q-text {
      font-size: 16px;
      font-weight: 500;
    }

    .options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .options label {
      flex: 1;
      min-width: 100px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      background: white;
    }

    .options label:hover {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .options input[type="radio"] {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid #bbb;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
      transition: all 0.2s;
    }

    .options input[type="radio"]:checked {
      border-color: var(--primary);
    }

    .options input[type="radio"]:checked::after {
      content: "";
      position: absolute;
      top: 2px; left: 2px;
      width: 10px; height: 10px;
      background: var(--primary);
      border-radius: 50%;
    }

    .options label:has(input:checked) {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    /* Submit / Action buttons */
    .submit-area {
      margin-top: 24px;
      text-align: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #1a4a6e);
      color: white;
      border: none;
      padding: 14px 48px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(44, 110, 156, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(44, 110, 156, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--border);
      color: #888;
      padding: 10px 28px;
      font-size: 14px;
      border-radius: 20px;
      cursor: pointer;
      margin-left: 12px;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      border-color: #999;
      color: var(--text);
    }

    .btn-download {
      background: linear-gradient(135deg, #27ae60, #1e8449);
      color: white;
      border: none;
      padding: 12px 36px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(39, 174, 96, 0.3);
    }

    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
    }

    .btn-download:active {
      transform: translateY(0);
    }

    .btn-print {
      background: linear-gradient(135deg, #8e44ad, #6c3483);
      color: white;
      border: none;
      padding: 12px 36px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(142, 68, 173, 0.3);
      margin-left: 12px;
    }

    .btn-print:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(142, 68, 173, 0.4);
    }

    .btn-print:active {
      transform: translateY(0);
    }

    /* Result */
    .result {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 28px;
      margin-top: 24px;
      box-shadow: var(--shadow);
      display: none;
      text-align: center;
    }

    .result.show { display: block; }

    .result .result-icon {
      font-size: 56px;
      margin-bottom: 12px;
    }

    .result .result-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .result .result-detail {
      font-size: 14px;
      color: #666;
      margin-top: 8px;
    }

    .result .result-breakdown {
      margin-top: 16px;
      padding: 16px;
      background: var(--bg);
      border-radius: 8px;
      font-size: 14px;
      text-align: left;
    }

    .result .result-breakdown table {
      width: 100%;
      border-collapse: collapse;
    }

    .result .result-breakdown td {
      padding: 4px 8px;
    }

    .result .result-breakdown td:last-child {
      text-align: right;
      font-weight: 600;
    }

    .result.danger { border: 2px solid var(--danger); }
    .result.danger .result-title { color: var(--danger); }
    .result.warning { border: 2px solid var(--warning); }
    .result.warning .result-title { color: var(--warning); }
    .result.success { border: 2px solid var(--success); }
    .result.success .result-title { color: var(--success); }

    /* Export buttons area */
    .export-area {
      margin-top: 20px;
      display: none;
      text-align: center;
    }

    .export-area.show { display: block; }

    /* Footer */
    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: #aaa;
      padding-bottom: 40px;
    }

    footer a {
      color: var(--primary);
      text-decoration: none;
    }

    /* Responsive */
    @media (max-width: 600px) {
      body { padding: 12px; }
      header { padding: 24px 18px; }
      header h1 { font-size: 20px; }
      .info-grid { grid-template-columns: 1fr; }
      .question { padding: 16px; }
      .options label {
        min-width: 80px;
        padding: 8px 12px;
        font-size: 13px;
      }
      .question .q-text { font-size: 14px; }
      .btn-primary { padding: 12px 32px; font-size: 16px; }
      .btn-download, .btn-print { padding: 10px 24px; font-size: 14px; margin: 6px; }
    }

    /* Print styles */
    @media print {
      @page {
        margin: 15mm 18mm;
      }

      body {
        background: white;
        padding: 0;
        font-size: 11pt;
      }

      .no-print { display: none !important; }

      header {
        background: var(--primary) !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        padding: 18px 20px;
        margin-bottom: 16px;
      }

      header h1 { font-size: 18pt; }

      .question {
        break-inside: avoid;
        box-shadow: none;
        border: 1px solid #ddd;
        padding: 12px 16px;
        margin-bottom: 8px;
      }

      .question .q-num {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .options label {
        border: 1px solid #ccc;
        padding: 6px 12px;
      }

      .options label:has(input:checked) {
        background: #e8f0f8 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        border-color: var(--primary);
      }

      .info-section {
        box-shadow: none;
        border: 1px solid #ddd;
      }

      .result {
        box-shadow: none;
        border: 2px solid #ddd;
      }

      .result.danger,
      .result.warning,
      .result.success {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>📋 吞嚥困難篩檢問卷</h1>
    <div class="subtitle">Dysphagia Screening Questionnaire</div>
    <div class="ref">參考文獻：Ohkuma R, et al. JJDR, 6(1):3-8, 2002</div>
  </header>

  <!-- ===== Basic Information Section ===== -->
  <div class="info-section">
    <h2>📌 基本資料</h2>
    <div class="info-grid">
      <div class="info-field">
        <label>填表日期 <span class="required">*</span></label>
        <input type="date" id="inputDate">
      </div>
      <div class="info-field">
        <label>病人姓名 <span class="required">*</span></label>
        <input type="text" id="inputName" placeholder="請輸入姓名">
      </div>
      <div class="info-field">
        <label>性別 <span class="required">*</span></label>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="男"> 男</label>
          <label><input type="radio" name="gender" value="女"> 女</label>
        </div>
      </div>
      <div class="info-field">
        <label>年齡 <span class="required">*</span></label>
        <input type="number" id="inputAge" min="0" max="120" placeholder="歲">
      </div>
      <div class="info-field">
        <label>病歷號</label>
        <input type="text" id="inputChartNo" placeholder="選填">
      </div>
      <div class="info-field">
        <label>填表人</label>
        <select id="inputRespondent">
          <option value="">— 請選擇 —</option>
          <option value="病人本人">病人本人</option>
          <option value="家屬">家屬</option>
          <option value="照護者">照護者</option>
          <option value="醫療人員">醫療人員</option>
          <option value="其他">其他</option>
        </select>
      </div>
    </div>
  </div>

  <div class="intro-card">
    <p><strong>填寫說明：</strong>請依近 2～3 年的情況進行回答。每一個都是很重要的症狀，請仔細閱讀後圈選。</p>
  </div>

  <div class="progress-text" id="progressText">0 / 15 題已填寫</div>
  <div class="progress-bar">
    <div class="fill" id="progressFill"></div>
  </div>

  <!-- Questions injected by JS -->
  <div id="questionsContainer"></div>

  <div class="submit-area">
    <button class="btn-primary" id="btnSubmit" disabled onclick="checkResult()">查看篩檢結果</button>
    <button class="btn-secondary no-print" onclick="resetAll()">重新填寫</button>
  </div>

  <!-- Result -->
  <div class="result" id="resultBox">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-detail" id="resultDetail"></div>
    <div class="result-breakdown" id="resultBreakdown"></div>
  </div>

  <!-- Export/Download buttons -->
  <div class="export-area no-print" id="exportArea">
    <button class="btn-download" onclick="downloadReport()">📥 下載報告</button>
    <button class="btn-print" onclick="window.print()">🖨️ 列印</button>
  </div>

  <footer>
    本問卷僅供吞嚥困難初步篩檢參考，不作為診斷依據。<br>
    如有吞嚥問題請諮詢專業醫療人員。<br>
    原始問卷來自「語言治療資訊讚」
  </footer>
</div>

<script>
  // Auto-fill today's date
  document.addEventListener('DOMContentLoaded', () => {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    document.getElementById('inputDate').value = `${yyyy}-${mm}-${dd}`;
  });

  const questions = [
    { id: 1, text: '曾經被診斷為肺炎嗎？', a: '經常反覆', b: '只有一次', c: '沒有' },
    { id: 2, text: '有體重減輕的現象嗎？', a: '明顯的', b: '很少', c: '沒有' },
    { id: 3, text: '曾感受到難以吞嚥東西的情形？', a: '經常', b: '有時候', c: '沒有' },
    { id: 4, text: '吃東西的時候曾經有嗆咳的情形嗎？', a: '經常', b: '有時候', c: '沒有' },
    { id: 5, text: '喝茶的時候曾經有嗆咳的情形嗎？', a: '經常', b: '有時候', c: '沒有' },
    { id: 6, text: '吃飯時、吃飯後，是否喉嚨有咕嚕咕嚕（卡痰感覺）？', a: '經常', b: '有時候', c: '沒有' },
    { id: 7, text: '曾感覺喉嚨仍有食物殘留的情形嗎？', a: '經常', b: '有時候', c: '沒有' },
    { id: 8, text: '會覺得吃一餐飯時間拉長了，進食速度變慢了嗎？', a: '明顯的', b: '很少', c: '沒有' },
    { id: 9, text: '會覺得硬的食物有變得不好吞嗎？', a: '明顯的', b: '很少', c: '沒有' },
    { id: 10, text: '曾經有食物從嘴裡掉出來的情形嗎？', a: '經常', b: '有時候', c: '沒有' },
    { id: 11, text: '曾經有口腔中有食物殘留的情形嗎？', a: '經常', b: '有時候', c: '沒有' },
    { id: 12, text: '曾經有食物或胃酸從胃部逆流到喉嚨的情形嗎？', a: '經常', b: '有時候', c: '沒有' },
    { id: 13, text: '曾經有食物留在胸口、卡住的感覺嗎？', a: '經常', b: '有時候', c: '沒有' },
    { id: 14, text: '曾經在半夜睡到一半因咳嗽咳醒嗎？', a: '經常', b: '有時候', c: '沒有' },
    { id: 15, text: '聲音是否變得沙沙的？（嘶啞、沙啞聲）', a: '明顯的', b: '很少', c: '沒有' }
  ];

  const container = document.getElementById('questionsContainer');

  questions.forEach((q, idx) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `
      <div class="q-header">
        <span class="q-num">${idx + 1}</span>
        <span class="q-text">${q.text}</span>
      </div>
      <div class="options">
        <label>
          <input type="radio" name="q${q.id}" value="A" onchange="updateProgress()">
          <span>A. ${q.a}</span>
        </label>
        <label>
          <input type="radio" name="q${q.id}" value="B" onchange="updateProgress()">
          <span>B. ${q.b}</span>
        </label>
        <label>
          <input type="radio" name="q${q.id}" value="C" onchange="updateProgress()">
          <span>C. ${q.c}</span>
        </label>
      </div>
    `;
    container.appendChild(div);
  });

  function getAnswers() {
    const answers = [];
    questions.forEach(q => {
      const sel = document.querySelector(`input[name="q${q.id}"]:checked`);
      answers.push(sel ? sel.value : null);
    });
    return answers;
  }

  function getBasicInfo() {
    return {
      date: document.getElementById('inputDate').value,
      name: document.getElementById('inputName').value.trim(),
      gender: document.querySelector('input[name="gender"]:checked')?.value || '',
      age: document.getElementById('inputAge').value,
      chartNo: document.getElementById('inputChartNo').value.trim(),
      respondent: document.getElementById('inputRespondent').value
    };
  }

  function validateBasicInfo() {
    const info = getBasicInfo();
    if (!info.date) return '請填寫填表日期';
    if (!info.name) return '請輸入病人姓名';
    if (!info.gender) return '請選擇性別';
    if (!info.age) return '請輸入年齡';
    return null;
  }

  function updateProgress() {
    const answers = getAnswers();
    const answered = answers.filter(a => a !== null).length;
    const total = questions.length;
    document.getElementById('progressText').textContent = `${answered} / ${total} 題已填寫`;
    document.getElementById('progressFill').style.width = `${(answered / total) * 100}%`;

    const btn = document.getElementById('btnSubmit');
    btn.disabled = answered < total;
  }

  function checkResult() {
    // Validate basic info first
    const err = validateBasicInfo();
    if (err) {
      alert(err);
      return;
    }

    const answers = getAnswers();
    const countA = answers.filter(a => a === 'A').length;
    const countB = answers.filter(a => a === 'B').length;
    const countC = answers.filter(a => a === 'C').length;

    const box = document.getElementById('resultBox');
    const icon = document.getElementById('resultIcon');
    const title = document.getElementById('resultTitle');
    const detail = document.getElementById('resultDetail');
    const breakdown = document.getElementById('resultBreakdown');

    box.className = 'result show';
    box.classList.remove('danger', 'warning', 'success');

    let aList = [], bList = [];
    questions.forEach((q, i) => {
      if (answers[i] === 'A') aList.push(`第${q.id}題`);
      if (answers[i] === 'B') bList.push(`第${q.id}題`);
    });

    let breakdownHTML = `<table>
      <tr><td>選 A（經常／明顯反覆）</td><td>${countA} 題</td></tr>
      <tr><td>選 B（有時候／很少）</td><td>${countB} 題</td></tr>
      <tr><td>選 C（沒有）</td><td>${countC} 題</td></tr>
    </table>`;

    if (aList.length > 0) {
      breakdownHTML += `<p style="margin-top:10px;color:var(--danger);font-weight:600;">⚠ 選 A 項目：${aList.join('、')}</p>`;
    }
    if (bList.length > 0 && aList.length === 0) {
      breakdownHTML += `<p style="margin-top:10px;color:var(--warning);font-weight:600;">🔍 選 B 項目：${bList.join('、')}</p>`;
    }

    breakdown.innerHTML = breakdownHTML;

    if (countA > 0) {
      icon.textContent = '⚠️';
      title.textContent = '篩檢結果：吞嚥困難';
      detail.textContent = '您有至少一項症狀達到「經常／明顯反覆」的程度，建議進一步接受專業吞嚥評估。';
      box.classList.add('danger');
    } else if (countB > 0) {
      icon.textContent = '🔍';
      title.textContent = '篩檢結果：疑似吞嚥困難';
      detail.textContent = '您雖然沒有高度頻率的症狀，但部分項目勾選了「有時候／很少」，建議持續觀察或諮詢專業意見。';
      box.classList.add('warning');
    } else {
      icon.textContent = '✅';
      title.textContent = '篩檢結果：無明顯異常';
      detail.textContent = '您目前無明顯吞嚥困難相關症狀，請維持良好飲食習慣並持續留意。';
      box.classList.add('success');
    }

    // Show export buttons
    document.getElementById('exportArea').classList.add('show');

    // Scroll to result
    box.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function resetAll() {
    // Reset basic info (keep date)
    document.getElementById('inputName').value = '';
    document.querySelectorAll('input[name="gender"]').forEach(el => el.checked = false);
    document.getElementById('inputAge').value = '';
    document.getElementById('inputChartNo').value = '';
    document.getElementById('inputRespondent').value = '';

    // Reset answers
    document.querySelectorAll('input[type="radio"]').forEach(el => el.checked = false);

    // Hide result & export
    document.getElementById('resultBox').className = 'result';
    document.getElementById('resultBox').classList.remove('danger', 'warning', 'success');
    document.getElementById('exportArea').classList.remove('show');

    updateProgress();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function buildReportText() {
    const info = getBasicInfo();
    const answers = getAnswers();

    const genderMap = { '男': 'Male', '女': 'Female' };

    let text = '';
    text += '========================================\n';
    text += '  吞嚥困難篩檢問卷 報告\n';
    text += '  Dysphagia Screening Questionnaire\n';
    text += '========================================\n\n';

    text += '--- 基本資料 ---\n';
    text += `填表日期：${info.date}\n`;
    text += `病人姓名：${info.name}\n`;
    text += `性    別：${info.gender}\n`;
    text += `年    齡：${info.age} 歲\n`;
    if (info.chartNo) text += `病歷號碼：${info.chartNo}\n`;
    if (info.respondent) text += `填 表 人：${info.respondent}\n`;
    text += '\n';

    text += '--- 問卷作答 ---\n';
    const labelMap = { 'A': 'A', 'B': 'B', 'C': 'C' };
    questions.forEach((q, i) => {
      const val = answers[i];
      const ansText = val === 'A' ? q.a : val === 'B' ? q.b : val === 'C' ? q.c : '未作答';
      text += `  ${String(q.id).padStart(2)}. ${q.text}\n`;
      text += `     作答：${val || '—'} (${ansText})\n`;
    });
    text += '\n';

    const countA = answers.filter(a => a === 'A').length;
    const countB = answers.filter(a => a === 'B').length;
    const countC = answers.filter(a => a === 'C').length;

    text += '--- 統計 ---\n';
    text += `  選 A（經常/明顯反覆）：${countA} 題\n`;
    text += `  選 B（有時候/很少）：  ${countB} 題\n`;
    text += `  選 C（沒有）：        ${countC} 題\n\n`;

    text += '--- 篩檢結果 ---\n';
    if (countA > 0) {
      text += '  判定：⚠️ 吞嚥困難\n';
      text += '  建議：有至少一項症狀達到「經常/明顯反覆」的程度，\n';
      text += '         建議進一步接受專業吞嚥評估。\n';
    } else if (countB > 0) {
      text += '  判定：🔍 疑似吞嚥困難\n';
      text += '  建議：部分項目勾選「有時候/很少」，\n';
      text += '         建議持續觀察或諮詢專業意見。\n';
    } else {
      text += '  判定：✅ 無明顯異常\n';
      text += '  建議：目前無明顯吞嚥困難相關症狀，\n';
      text += '         請維持良好飲食習慣並持續留意。\n';
    }

    text += '\n---\n';
    text += '參考文獻：Ohkuma R, et al. JJDR, 6(1):3-8, 2002\n';
    text += '本報告僅供吞嚥困難初步篩檢參考，不作為診斷依據。\n';

    return text;
  }

  function downloadReport() {
    const text = buildReportText();
    const info = getBasicInfo();
    const filename = `吞嚥篩檢報告_${info.name || '未命名'}_${info.date || '未填日期'}.txt`;

    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
</script>
